<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejemplo de formulario</title>
    <script src="29_formularios_2_con_js.js" type="module" defer></script>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
      h1 {
        text-align: center;
      }
      fieldset {
        max-width: 80%;
        margin: 0 auto;
        background-color: antiquewhite;
        padding: 1rem;
        border-radius: 5px;
      }
      legend {
        text-align: center;
        font-size: 1.2rem;
      }
      main {
        div {
          margin-bottom: 1rem;
          max-width: 100%;
        }
        label {
          display: block;
        }
        input {
          width: 90%;
          padding: 5px 10px;
        }
      }
      #buttons {
        display: flex;
        justify-content: space-between;

        button {
          font-size: 1.2rem;
          padding: 5px 10px;
        }
      }

      #buttons button:first-child {
        background-color: green;
        color: white;

        &:hover {
          background-color: white;
          color: green;
        }
      }
      #buttons button:last-child {
        background-color: darkred;
        color: white;

        &:hover {
          background-color: white;
          color: darkred;
        }
      }
      .errorDato {
        font-size: 0.8rem;
        color: darkblue;
        height: 1rem;
      }
    </style>
  </head>
  <body>
    <head>
      <h1>Formulario sencillo</h1>
    </head>
    <main>
      <form name="formularioSencillo">
        <fieldset>
          <legend>Introduce tus datos</legend>
          <div>
            <label for="nombre">Nombre (*)</label>
            <input
              type="text"
              name="nombre"
              id="nombre"
              minlength="2"
              maxlength="20"
            />
            <div>
              <p id="errorNombre" class="errorDato"></p>
            </div>
          </div>
          <div>
            <label for="apellido">Apellido/s (*)</label>
            <input
              type="text"
              name="apellido"
              id="apellido"
              minlength="2"
              maxlength="250"
            />
            <div>
              <p id="errorApellido" class="errorDato"></p>
            </div>
          </div>
          <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" />
          </div>

          <div>
            <label for="password">Contraseña</label>
            <input
              type="password"
              name="password"
              id="password"
              minlength="6"
              maxlength="6"
            />
          </div>
          <div>
            <label for="fechaN">Fecha de nacimiento</label>
            <input type="date" name="fechaNacimiento" id="fechaN" />
            <div>
              <p id="menorEdad" class="errorDato"></p>
            </div>
          </div>
          <div id="buttons">
            <button type="submit">Enviar</button>
            <button type="reset">Borrar</button>
          </div>
        </fieldset>
      </form>

      <!-- Ventana emergente = Modal -->
      <dialog id="dialog" closedby="any">
        <h2>Datos introducidos</h2>
        <!-- Contenedor para los datos  -->
        <div id="datosIntroducidos"></div>
        <!-- Botón para cerrar la ventana  -->
        <form method="dialog">
          <div>
            <button id="cerrarVentana">Cerrar</button>
          </div>
        </form>
      </dialog>

    </main>
  </body>
</html>
